name: care_child_app
description: AI-powered AAC application for autism support
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  go_router: ^17.0.0
  supabase_flutter: ^2.12.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_tts: ^4.2.5
  google_fonts: ^8.0.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  image_cropper: ^12.0.0
  path_provider: ^2.1.5
  wifi_scan: ^0.4.1
  network_info_plus: ^8.0.0
  permission_handler: ^12.0.0
  connectivity_plus: ^7.0.0
  fl_chart: ^1.2.0
  crypto: ^3.0.3
  http: ^1.2.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.local
